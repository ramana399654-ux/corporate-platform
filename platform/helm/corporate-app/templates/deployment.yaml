spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: submission-api

  template:
    metadata:
      labels:
        app: submission-api

    spec:

      imagePullSecrets:
      - name: acr-secret


      containers:
      - name: submission-api
        image: "{{ .Values.submission.image.repository }}:{{ .Values.submission.image.tag }}"
        ports:
        - containerPort: {{ .Values.service.targetPort }}
