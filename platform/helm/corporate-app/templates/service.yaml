apiVersion: v1
kind: Service

metadata:
  name: correlation-service
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: correlation-api

  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}


---

apiVersion: v1
kind: Service

metadata:
  name: submission-service
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: submission-api

  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
