name: Build and Push Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: self-hosted

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "8b322099-2467-4a7f-a427-003c3dabed69",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Login to ACR
      run: |
        az acr login --name orstedlabacr

    - name: Build and Push correlation-api
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
        -t orstedlabacr.azurecr.io/correlation-api:${IMAGE_TAG} \
        ./corporate-app/correlation-api

        docker push \
        orstedlabacr.azurecr.io/correlation-api:v2

    - name: Deploy Helm chart
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        helm upgrade --install corporate-app \
        ./platform/helm/corporate-app \
        -n orsted-lab \
        --set correlation.image.tag=${IMAGE_TAG}
